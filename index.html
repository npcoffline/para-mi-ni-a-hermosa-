<!DOCTYPE html>
<html>
<head>
    <title>Para Valentina 💖</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Comic Sans MS", cursive;
            text-align: center;
        }

        #mensaje {
            display: none;
            font-size: 28px;
            max-width: 90%;
            color: #ff4d6d;
            text-shadow: 0 0 10px white;
            z-index: 1;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 10px #ff4d6d;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: subir linear infinite;
        }

        @keyframes subir {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

<button onclick="mostrarMensaje()">💌 Toca aquí 💌</button>

<div id="mensaje"></div>

<script>
const texto = "Eres la niña más hermosa que conozco 💖\nValentina, me encantan tus ojitos hermosos 🥺💘";
let i = 0;

function mostrarMensaje() {
    document.querySelector("button").style.display = "none";
    const mensaje = document.getElementById("mensaje");
    mensaje.style.display = "block";

    function escribir() {
        if (i < texto.length) {
            mensaje.innerHTML += texto[i] === "\n" ? "<br>" : texto[i];
            i++;
            setTimeout(escribir, 50);
        }
    }
    escribir();
}

function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    const emojis = ["💖","💘","💗","💞","💝","💓","🌸","🎀"];
    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
